name: Build Android Bridge APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/build-ipa-ci

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platforms;android-36 build-tools;36.0.0 platform-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.7"
          cache-provider: basic

      - name: Build debug APK
        run: scripts/build-apk.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenMonitorBridge-apk
          path: android-bridge/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
