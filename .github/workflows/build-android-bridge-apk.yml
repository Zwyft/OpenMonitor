name: Build Android Bridge APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/build-ipa-ci

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platforms;android-36 build-tools;36.0.0 platform-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.7"
          cache-provider: basic

      - name: Build debug APK
        run: scripts/build-apk.sh

      - name: Stage release APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/OpenMonitorBridge.apk

      - name: Publish APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-bridge-latest
          target_commitish: ${{ github.sha }}
          name: Android Bridge Latest
          prerelease: true
          make_latest: true
          overwrite_files: true
          body: |
            Automated Android bridge APK build from ${{ github.sha }}.
          files: |
            android-bridge/app/build/outputs/apk/debug/OpenMonitorBridge.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMonitorBridge-apk-zip
          path: android-bridge/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
