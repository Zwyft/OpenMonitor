name: Build BaseusSecurity Tweak

on:
  push:
    paths:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dpkg (needed for .deb packaging)
        run: brew install dpkg
# Ensure dm.pl step removed (handled via Theos bin download)
      - name: Clone Theos and install dm.pl
        run: |
          git clone https://github.com/theos/theos.git $HOME/theos
          git -C $HOME/theos submodule update --init --recursive
          curl -L https://raw.githubusercontent.com/theos/theos/master/bin/dm.pl -o $HOME/theos/bin/dm.pl
          chmod +x $HOME/theos/bin/dm.pl
          echo "$HOME/theos/bin" >> $GITHUB_PATH
      - name: Update Theos vendor files
        run: |
          THEOS=$HOME/theos $HOME/theos/bin/update-theos
      - name: Copy dm.pl into vendor
        run: |
          mkdir -p $HOME/theos/vendor/dm.pl
          if [ ! -f $HOME/theos/vendor/dm.pl/dm.pl ]; then
            cp $HOME/theos/bin/dm.pl $HOME/theos/vendor/dm.pl/dm.pl
          fi
          chmod +x $HOME/theos/vendor/dm.pl/dm.pl
          echo "$HOME/theos/vendor/dm.pl" >> $GITHUB_PATH
          echo "$HOME/theos/bin" >> $GITHUB_PATH
      - name: Verify dm.pl vendor
        run: |
          echo "Listing vendor dm.pl directory:"
          ls -R $HOME/theos/vendor/dm.pl || true
          echo "Showing dm.pl content:"
          cat $HOME/theos/vendor/dm.pl/dm.pl || true
      - name: Set up Theos environment
        run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_PLATFORM=iphone" >> $GITHUB_ENV
      - name: Build the tweak
        env:
          THEOS_PLATFORM: iphone
        run: |
          make package
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: baseussecurity-deb
          path: packages/*.deb
